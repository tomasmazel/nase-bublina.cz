<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naše bublina</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b12;
    }

    body {
      position: relative;
    }

    .bg-blur {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(18px) brightness(0.65) saturate(1.05);
      transform: scale(1.08);
    }

    .main-image {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: fadeIn 1.2s ease;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.10), transparent 35%),
        linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(0,0,0,0.28));
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .content {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 5vh 4vw;
      pointer-events: none;
      animation: fadeInUp 1.5s ease;
    }

    .glass {
      padding: 16px 24px;
      border-radius: 22px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.20);
    }

    .caption {
      margin: 0;
      color: rgba(255,255,255,0.96);
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.01); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .glass {
        padding: 12px 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <img class="bg-blur" src="bublina.png" alt="">
  <div class="overlay"></div>
  <img class="main-image" src="bublina.png" alt="Naše bublina">
  <div class="vignette"></div>

  <div class="content">
    <div class="glass">
      <p class="caption">Naše bublina</p>
    </div>
  </div>
</body>
</html>
