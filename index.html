<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naše bublina</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b12;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(22px) brightness(0.55);
      transform: scale(1.08);
    }

    .shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(0,0,0,0.22));
    }

    .frame {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 90px 20px;
      z-index: 2;
    }

    .main {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 12px 30px rgba(0,0,0,0.18));
    }

    .label-wrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 26px;
      display: flex;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }

    .label {
      padding: 14px 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(14px, 2vw, 22px);
    }

    .music-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-size: 16px;
    }

    .music-btn:hover {
      background: rgba(255,255,255,0.3);
    }

  </style>
</head>
<body>
  <img class="bg" src="bublina.png" alt="">
  <div class="shade"></div>

  <div class="frame">
    <img class="main" src="bublina.png" alt="Naše bublina">
  </div>

  <div class="label-wrap">
    <div class="label">Naše bublina</div>
  </div>

  <button class="music-btn" id="musicBtn">🎵 Pustit hudbu</button>

  <audio id="bg-music" loop>
    <source src="hudba.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('bg-music');
    const btn = document.getElementById('musicBtn');
    audio.volume = 0.3;

    btn.addEventListener('click', function () {
      if (audio.paused) {
        audio.play();
        btn.textContent = '⏸️ Vypnout hudbu';
      } else {
        audio.pause();
        btn.textContent = '🎵 Pustit hudbu';
      }
    });
  </script>
</body>
</html>
