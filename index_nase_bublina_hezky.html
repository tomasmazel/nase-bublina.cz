<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naše bublina</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    body {
      position: relative;
    }

    .background {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: zoomIn 10s ease-out forwards;
      transform: scale(1.05);
      filter: saturate(1.05) contrast(1.02);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 35%),
        linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.42));
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 5vh 4vw;
      animation: fadeIn 1.6s ease;
    }

    .glass {
      padding: 16px 24px;
      border-radius: 22px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.20);
    }

    .caption {
      margin: 0;
      color: rgba(255,255,255,0.96);
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes zoomIn {
      from {
        transform: scale(1.08);
      }
      to {
        transform: scale(1);
      }
    }

    @media (max-width: 640px) {
      .glass {
        padding: 12px 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <img class="background" src="bublina.png" alt="Naše bublina">
  <div class="overlay"></div>
  <div class="vignette"></div>

  <div class="content">
    <div class="glass">
      <p class="caption">Naše bublina</p>
    </div>
  </div>
</body>
</html>
